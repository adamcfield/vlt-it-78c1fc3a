<!DOCTYPE html><html lang="he" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>וולטה — דשבורד IT (מצרפי)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><style>
:root{--bg:#0f172a;--card:#1e293b;--c2:#26334a;--txt:#e2e8f0;--mut:#94a3b8;--acc:#38bdf8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:"Segoe UI",Arial,sans-serif;padding:20px}
h1{font-size:23px;margin:0 0 2px}h2{font-size:15px;margin:0 0 12px;color:var(--acc)}
.sub{color:var(--mut);font-size:13px;margin-bottom:16px}.live{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-inline-start:6px;animation:p 1.6s infinite}@keyframes p{50%{opacity:.3}}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid #2b3a55;border-radius:13px;padding:13px 15px}.kpi .n{font-size:27px;font-weight:700}.kpi .l{color:var(--mut);font-size:12px;margin-top:5px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:15px;margin-bottom:18px}
.card{background:var(--card);border:1px solid #2b3a55;border-radius:13px;padding:15px}.wide{grid-column:1/-1}canvas{max-height:290px}
ul.list{margin:0;padding-inline-start:18px}ul.list li{margin-bottom:9px;line-height:1.55}
.foot{color:var(--mut);font-size:12px;margin-top:14px;text-align:center}.tag{display:inline-block;background:rgba(56,189,248,.12);color:#7dd3fc;border-radius:6px;padding:2px 8px;font-size:11px;margin-inline-start:8px}
</style></head><body>
<h1>וולטה סולאר — דשבורד IT <span class="live"></span><span class="tag">מצרפי · ללא נתונים אישיים</span></h1>
<div class="sub" id="sub"></div>
<div class="kpis" id="kpis"></div>
<div class="grid">
  <div class="card"><h2>נפח הודעות IT לחודש</h2><canvas id="cMon"></canvas></div>
  <div class="card"><h2>לפי מערכת</h2><canvas id="cSys"></canvas></div>
  <div class="card"><h2>מונחים נפוצים</h2><canvas id="cKw"></canvas></div>
  <div class="card"><h2>לפי ערוץ (קבוצות / DM)</h2><canvas id="cChan"></canvas></div>
</div>
<div class="card wide"><h2>תובנות והמלצות</h2><ul class="list" id="ins"></ul></div>
<div class="foot" id="ft"></div>
<script>
const D={"live": {"byMonth": [["2025-12", 99], ["2026-01", 233], ["2026-02", 203], ["2026-03", 359], ["2026-04", 340], ["2026-05", 603], ["2026-06", 493]], "bySystem": [["Hardware", 617], ["Access / Permissions", 598], ["Zoho", 290], ["Identity / Auth", 279], ["Errors / Faults", 218], ["Google Drive / Sheets", 183], ["OutSystems", 146], ["Podio", 106], ["Make / Integration", 73], ["Security", 44], ["Priority ERP", 29], ["Telephony / CX", 22], ["Google Ads", 12]], "byChannel": [["פניות אישיות (DM)", 1193], ["קבוצה אחרת", 427], ["Innovation Support - Ops", 199], ["Volta New Customers וולטה", 139], ["Innovation Support - Business", 107], ["Innovation Support - HR", 84], ["Innovation Support - Field", 70], ["Volta Operations", 24], ["Volta website", 21], ["Volta - מקדמות", 21]], "byKeyword": [["גישה", 462], ["מחשב", 401], ["זוהו", 155], ["zoho", 141], ["outsystems", 124], ["מסך", 113], ["אימות", 82], ["פודיו", 81], ["תקלה", 76], ["דרייב", 67], ["סיסמה", 62], ["הרשאות", 61], ["להתחבר", 61], ["סוללה", 60], ["drive", 50]], "total": 2330, "inbound": 1684, "mine": 646, "updated": "2026-06-17 15:44", "rangeDays": 180}, "insights": ["צי המחשבים הוא כאב מרכזי: מחשבים ניידים בני 5–6 שנים שמקרטעים/קורסים. מומלצת תוכנית רענון צי מתוקצבת + מלאי מחשבים זמין לגיוסים חדשים, במקום פירמוטים חוזרים.", "בקשות הרשאה (Drive/דשבורדים/אדמין) חוזרות שוב ושוב, רבות לעובדים חדשים. מומלץ onboarding/offboarding אוטומטי מבוסס קבוצות הרשאה (security groups) לפי תפקיד.", "אימות וזהות (2FA תקוע, איפוסי סיסמה, מעבר ל-Google SSO) הם נתח גדול. מומלץ SSO אחיד על כל המערכות + פורטל self-service לאיפוס סיסמה/2FA.", "Zoho היא המערכת הכי עמוסה (סנכרון נכסים, טפסים, סטטוסים, OneAuth). מומלץ אחראי-מערכת ייעודי + QA לפני עליית טפסים + naming convention שמשייך כל טופס ללקוח.", "עומס התמיכה מרוכז בערוצי Innovation Support. מומלצת מערכת כרטוס (ticketing) רשמית במקום WhatsApp — למעקב, מניעת כפילויות ומדידת SLA.", "ריכוז ניהול מערכות קריטיות בידי אדם יוצר נקודת כשל יחידה. מומלץ אדמין משני/break-glass ותיעוד הרשאות קריטיות.", "שני אירועי אבטחה תוך ~3 חודשים מצדיקים EDR/אנטי-וירוס מנוהל, MFA חזק והדרכת מודעות לעובדים."]},L=D.live,P=['#38bdf8','#a855f7','#f59e0b','#22c55e','#ef4444','#14b8a6','#eab308','#fb7185','#60a5fa','#34d399','#c084fc','#f472b6','#fbbf24'];
const $=s=>document.querySelector(s),E=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
$('#sub').innerHTML=`עודכן: <b>${L.updated}</b> · ${L.rangeDays} יום אחרונים · ${L.total} הודעות בנושא IT (${L.inbound} נכנסות / ${L.mine} שלי)`;
const k=[[L.total,'הודעות IT'],[L.inbound,'פניות נכנסות'],[L.bySystem.length,'מערכות'],[L.byMonth.length,'חודשים'],[L.byChannel.length,'ערוצים']];
$('#kpis').innerHTML=k.map(([n,l])=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
function bar(id,pr,h){new Chart(document.getElementById(id),{type:'bar',data:{labels:pr.map(p=>p[0]),datasets:[{data:pr.map(p=>p[1]),backgroundColor:pr.map((p,i)=>P[i%P.length]),borderRadius:6}]},options:{indexAxis:h?'y':'x',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#243049'}},y:{ticks:{color:'#cbd5e1'},grid:{color:'#243049'}}}}});}
new Chart(document.getElementById('cMon'),{type:'line',data:{labels:L.byMonth.map(p=>p[0]),datasets:[{data:L.byMonth.map(p=>p[1]),borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.18)',fill:true,tension:.3,pointRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#243049'}},y:{ticks:{color:'#94a3b8'},grid:{color:'#243049'}}}}});
bar('cSys',L.bySystem,true);bar('cKw',L.byKeyword,true);bar('cChan',L.byChannel,true);
$('#ins').innerHTML=D.insights.map(x=>`<li>${E(x)}</li>`).join('');
$('#ft').innerHTML=`מתעדכן אוטומטית כל לילה מה-DB המקומי · נתונים מצרפיים בלבד (ללא שמות/תוכן הודעות) · עודכן ${L.updated}`;
</script></body></html>
